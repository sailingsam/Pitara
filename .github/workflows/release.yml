name: release

# Runs on GitHub's servers whenever you push a version tag (e.g. v0.1.0).
# Builds all platform binaries with GoReleaser and creates the GitHub Release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the release and upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs full history/tags

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
